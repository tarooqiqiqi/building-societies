<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buckinghamshire Building Society – UK Building Societies</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f1117;color:#e8e6df;font-family:'Source Sans 3',sans-serif;min-height:100vh}
header{background:#1a1d27;border-bottom:1px solid #2e3348;padding:12px 20px;position:sticky;top:0;z-index:10}
header a{color:#7a7d8f;text-decoration:none;font-size:0.85rem}
header a:hover{color:#e8e6df}
.hero{background:#1a1d27;border-bottom:1px solid #2e3348;padding:28px 20px 24px}
.hero-inner{max-width:680px;margin:0 auto}
.primary-logo{max-height:70px;max-width:180px;object-fit:contain;margin-bottom:16px;display:block}
.group-tag{display:inline-block;padding:3px 10px;border-radius:12px;font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:#0f1117;margin-bottom:12px}
h1{font-family:'Playfair Display',serif;font-size:clamp(1.3rem,4vw,1.8rem);font-weight:700;line-height:1.2;margin-bottom:6px}
.trading-name{font-size:0.82rem;color:#7a7d8f;font-style:italic;margin-bottom:10px}
.footnote{font-size:0.78rem;color:#7a7d8f;margin-top:6px}
.meta-row{display:flex;gap:20px;margin-top:14px;flex-wrap:wrap}
.meta-item{display:flex;flex-direction:column;gap:3px}
.meta-label{font-size:0.68rem;text-transform:uppercase;letter-spacing:0.08em;color:#7a7d8f}
.meta-value{font-size:0.88rem}
.fate-badge{display:inline-block;padding:2px 10px;border-radius:10px;font-size:0.72rem;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:#fff}
.container{max-width:680px;margin:0 auto;padding:0 20px 60px}
.section{margin-top:28px;padding-top:20px;border-top:1px solid #2e3348}
.section h2{font-family:'Playfair Display',serif;font-size:1rem;font-weight:400;color:#7a7d8f;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px}
.body-text{line-height:1.8;color:#ccc;font-size:0.9rem;margin-bottom:1rem}
.body-text:last-child{margin-bottom:0}
.empty-note{color:#555;font-size:0.85rem;font-style:italic}
.conn-row{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:1px solid #1e2130;text-decoration:none;color:inherit;transition:background 0.1s}
.conn-row:hover{background:#1e2130;margin:0 -20px;padding:8px 20px}
.conn-year{color:#7a7d8f;font-size:0.75rem;min-width:34px;padding-top:3px;flex-shrink:0}
.conn-badge{font-size:0.62rem;padding:2px 6px;border-radius:3px;white-space:nowrap;flex-shrink:0;margin-top:2px;color:#fff}
.conn-name{font-size:0.85rem;line-height:1.4;flex:1}
.logo-timeline{display:flex;gap:24px;flex-wrap:wrap;align-items:flex-end}
.logo-timeline-item{display:flex;flex-direction:column;align-items:center;gap:8px}
.logo-label{font-size:0.7rem;color:#7a7d8f;text-transform:uppercase;letter-spacing:0.06em}
.timeline-logo{max-height:56px;max-width:140px;object-fit:contain}
</style>
</head>
<body>
<header><a href="../index.html">← Back to diagram</a></header>
<div class="hero"><div class="hero-inner">
  <img src="../logos/buckinghamshire.webp" alt="Buckinghamshire Building Society logo" class="primary-logo">
  <span class="group-tag" style="background:#e67e22">Buckinghamshire</span>
  <h1>Buckinghamshire Building Society</h1>
  
  <div class="meta-row">
    <div class="meta-item"><span class="meta-label">Period</span><span class="meta-value">1961–Present</span></div>
    <div class="meta-item"><span class="meta-label">Fate</span><span class="meta-value"><span class="fate-badge" style="background:#2d6a2d">Ongoing</span></span></div>
    <div class="meta-item"><span class="meta-label">Group</span><span class="meta-value">Buckinghamshire</span></div>
  </div>
</div></div>
<div class="container">
  <section class="section"><h2>History</h2><p class="empty-note">No history written yet.</p></section>
  
  <section class="section"><h2>Absorbed from</h2><a href="chalfont-district-permanent.html" class="conn-row"><span class="conn-year">1961</span><span class="conn-badge" style="background:#4a5568">renaming</span><span class="conn-name">Chalfont & District Permanent Building Society</span></a></section>
  
</div>
</body>
</html>
