<html lang="en">
<head>

<title>UK Building Society History</title>

<script src="https://cdn.jsdelivr.net/npm/cytoscape-dagre@2.5.0/cytoscape-dagre.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0f1117;--surface:#1a1d27;--border:#2e3348;--text:#e8e6df;--text-muted:#7a7d8f;
    --Bath:#4a90d9;--Beverley:#5cb85c;--Buckinghamshire:#e67e22;--Cambridge:#9b59b6;--Chorley:#e74c3c;--Coventry:#c49a3c;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Source Sans 3',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
  header{padding:14px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--surface)}
  header h1{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:400;letter-spacing:0.02em}
  header span{font-size:0.75rem;color:var(--text-muted)}
  #controls{padding:10px 24px;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:center;flex-wrap:wrap;flex-shrink:0;background:var(--surface)}
  .filter-label{font-size:0.7rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;margin-right:4px}
  .chip{padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-muted);font-size:0.75rem;cursor:pointer;transition:all 0.15s;font-family:inherit}
  .chip:hover{border-color:#555;color:var(--text)}
  .chip.active{color:#0f1117;font-weight:600;border-color:transparent}
  .chip[data-group="Bath"].active{background:var(--Bath)}
  .chip[data-group="Beverley"].active{background:var(--Beverley)}
  .chip[data-group="Buckinghamshire"].active{background:var(--Buckinghamshire)}
  .chip[data-group="Cambridge"].active{background:var(--Cambridge)}
  .chip[data-group="Chorley"].active{background:var(--Chorley)}
  .chip[data-group="Coventry"].active{background:var(--Coventry)}
  .chip[data-group="All"].active{background:#e8e6df}
  #layout-controls{margin-left:auto;display:flex;gap:6px}
  .btn{padding:4px 12px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--text-muted);font-size:0.75rem;cursor:pointer;transition:all 0.15s;font-family:inherit}
  .btn:hover{border-color:#555;color:var(--text)}
  #main{display:flex;flex:1;overflow:hidden}
  #cy{flex:1}
  #panel{width:290px;border-left:1px solid var(--border);background:var(--surface);padding:20px;overflow-y:auto;flex-shrink:0}
  #panel h2{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;margin-bottom:2px;line-height:1.3}
  #panel .trading-name{font-size:0.75rem;color:var(--text-muted);margin-bottom:8px;font-style:italic}
  #panel .group-tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:0.65rem;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px;color:#0f1117}
  #panel .row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:0.8rem;gap:12px}
  #panel .row .label{color:var(--text-muted);white-space:nowrap}
  #panel .conn-section-title{font-size:0.7rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin:12px 0 6px}
  #panel .conn-item{font-size:0.78rem;padding:5px 0;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:flex-start}
  #panel .conn-year{color:var(--text-muted);font-size:0.7rem;min-width:30px;padding-top:2px}
  #panel .conn-type{font-size:0.62rem;padding:2px 5px;border-radius:3px;background:var(--border);color:var(--text-muted);white-space:nowrap;align-self:flex-start;margin-top:1px}
  #panel .conn-name{flex:1;line-height:1.3;cursor:pointer;color:inherit}
  #panel .conn-name:hover{text-decoration:underline}
  #panel .view-page{display:block;margin-top:14px;padding:8px 14px;background:transparent;border:1px solid var(--border);border-radius:4px;color:var(--text-muted);font-size:0.78rem;text-align:center;text-decoration:none;font-family:inherit;cursor:pointer;transition:all 0.15s}
  #panel .view-page:hover{border-color:#888;color:var(--text)}
  #panel-placeholder{color:var(--text-muted);font-size:0.85rem;line-height:1.6;margin-top:8px}
  #legend{position:absolute;bottom:16px;left:16px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:10px 14px;font-size:0.72rem;pointer-events:none}
  #legend h4{color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;font-size:0.65rem;margin-bottom:8px}
  .legend-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;color:var(--text-muted)}
  .legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
  .legend-line{width:24px;height:0;flex-shrink:0}
  #panel .logo-img{max-width:100%;max-height:60px;object-fit:contain;margin-bottom:10px;filter:brightness(0) invert(1);opacity:0.85}
</style>
</head>

<header>

<div id="controls">

  <div id="layout-controls">

    <button class="btn" id="btn-dagre">Tree layout</button>
    <button class="btn" id="btn-cose">Force layout</button>
  </div>
</div>
<div id="main">
  <div id="cy"></div>
  <div id="panel">

</div>
<div id="legend">

  <div class="legend-row"><div class="legend-dot" style="background:#888;border-radius:3px"></div>Acquired</div>

  <div class="legend-row"><div class="legend-line" style="border-top:2px solid #c49a3c"></div>Acquisition</div>
</div>

type": "acquisition", "source": "consettreliance", "target": "leekwec", "notes": ""}, {"year": "1975", "type": "acquisition", "source": "bathlib", "target": "leekwec", "notes": ""}, {"year": "1975", "type": "renaming", "source": "leekwec", "target": "britannia", "notes": ""}, {"year": "1977", "type": "acquisition", "source": "calnedpb", "target": "britannia", "notes": ""}, {"year": "1977", "type": "acquisition", "source": "westburydp", "target": "britannia", "notes": ""}, {"year": "1978", "type": "acquisition", "source": "glantawe", "target": "britannia", "notes": ""}, {"year": "1980", "type": "acquisition", "source": "stokeotp", "target": "britannia", "notes": ""}, {"year": "1962", "type": "renaming", "source": "alfretondpb", "target": "alfreton", "notes": ""}, {"year": "1981", "type": "acquisition", "source": "alfreton", "target": "britannia", "notes": ""}, {"year": "1962", "type": "renaming", "source": "wellingtonetal", "target": "wellingtonsd", "notes": ""}, {"year": "1982", "type": "acquisition", "source": "wellingtonsd", "target": "britannia", "notes": ""}, {"year": "1982", "type": "acquisition", "source": "denton", "target": "britannia", "notes": ""}, {"year": "1962", "type": "renaming", "source": "overdarwenpb", "target": "overdarwen", "notes": ""}, {"year": "1982", "type": "acquisition", "source": "overdarwen", "target": "britannia", "notes": ""}, {"year": "1967", "type": "renaming", "source": "driffielderb", "target": "driffield", "notes": ""}, {"year": "1982", "type": "acquisition", "source": "driffield", "target": "britannia", "notes": ""}, {"year": "1983", "type": "acquisition", "source": "colne", "target": "britannia", "notes": ""}, {"year": "1984", "type": "acquisition", "source": "welsheco", "target": "britannia", "notes": ""}, {"year": "1962", "type": "renaming", "source": "blackheathdpb", "target": "blackheath", "notes": ""}, {"year": "1986", "type": "acquisition", "source": "blackheath", "target": "britannia", "notes": ""}, {"year": "1976", "type": "renaming", "source": "morningtonp", "target": "mornington", "notes": ""}, {"year": "1991", "type": "acquisition", "source": "mornington", "target": "britannia", "notes": ""}, {"year": "2009", "type": "acquisition", "source": "britannia", "target": "coopbank", "notes": ""}, {"year": "2025", "type": "acquisition", "source": "coopbank", "target": "coventry", "notes": ""}]};
const GROUP_COLORS = {Bath:'#4a90d9',Beverley:'#5cb85c',Buckinghamshire:'#e67e22',Cambridge:'#9b59b6',Chorley:'#e74c3c',Coventry:'#c49a3c'};
const EDGE_COLOR = {renaming:'#4a5568',merger:'#6b7db3',acquisition:'#c49a3c'};

function shortLabel(name) {
  return name.replace(/ Building Society.*$/,'').replace(/ Permanent.*$/,'').replace(/ Benefit.*$/,'').replace(/ Mutual.*$/,'').trim();
}

function buildElements(filterGroup) {
  const nodes = DATA.nodes
    .filter(n => filterGroup === 'All' || n.group === filterGroup)
    .map(n => ({data:{id:n.id,label:shortLabel(n.name),...n}}));
  const nodeIds = new Set(nodes.map(n => n.data.id));
  const edges = DATA.edges
    .filter(e => nodeIds.has(e.source) && nodeIds.has(e.target))
    .map(e => ({data:{id:e.source+'_'+e.target+'_'+e.year,...e}}));
  return [...nodes,...edges];
}

const dagreLayout = {name:'dagre',rankDir:'TB',ranker:'longest-path',nodeSep:40,rankSep:70,animate:false};
const coseLayout = {name:'cose',animate:true,randomize:false,nodeRepulsion:10000,idealEdgeLength:90,gravity:0.2};

const cy = cytoscape({
  container: document.getElementById('cy'),
  elements: buildElements('All'),
  style: [
    {selector:'node',style:{
      'background-color': n => GROUP_COLORS[n.data('group')]||'#555',
      'background-opacity': n => n.data('fate')==='Ongoing'?1:0.5,
      'shape': n => ({Ongoing:'star',Renamed:'ellipse',Merged:'diamond',Acquired:'round-rectangle'})[n.data('fate')]||'ellipse',
      'label':'data(label)',
      'font-family':'Source Sans 3, sans-serif','font-size':'9px','color':'#e8e6df',
      'text-valign':'bottom','text-halign':'center','text-margin-y':'4px',
      'text-outline-width':'2px','text-outline-color':'#0f1117',
      'width':16,'height':16,'border-width':0,
      'transition-property':'background-opacity, border-width','transition-duration':'0.15s'
    }},
    {selector:'node.highlighted',style:{'border-width':3,'border-color':'#fff','background-opacity':1}},
    {selector:'node.faded',style:{'background-opacity':0.08,'color':'transparent','text-outline-color':'transparent'}},
    {selector:'edge',style:{
      'line-color': e => EDGE_COLOR[e.data('type')]||'#555',
      'target-arrow-color': e => EDGE_COLOR[e.data('type')]||'#555',
      'target-arrow-shape':'triangle','arrow-scale':0.65,
      'width': e => e.data('type')==='acquisition'?1.5:1,
      'line-style': e => e.data('type')==='renaming'?'dashed':'solid',
      'curve-style':'bezier','opacity':0.65
    }},
    {selector:'edge.faded',style:{'opacity':0.04}},
    {selector:'edge.highlighted',style:{'opacity':1,'width':2.5}}
  ],
  layout: dagreLayout
});

document.getElementById('node-count').textContent = cy.nodes().length+' societies · '+cy.edges().length+' events';

document.getElementById('group-filters').addEventListener('click', e => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  cy.elements().remove();
  cy.add(buildElements(chip.dataset.group));
  cy.layout(dagreLayout).run();
  document.getElementById('node-count').textContent = cy.nodes().length+' societies · '+cy.edges().length+' events';
  clearPanel();
});

document.getElementById('btn-fit').addEventListener('click', () => cy.fit(undefined,40));
document.getElementById('btn-dagre').addEventListener('click', () => cy.layout(dagreLayout).run());
document.getElementById('btn-cose').addEventListener('click', () => cy.layout(coseLayout).run());

function clearPanel() {
  document.getElementById('panel-placeholder').style.display='block';
  document.getElementById('panel-content').style.display='none';
  cy.elements().removeClass('highlighted faded');
}

function showPanel(node) {
  const d = node.data();
  document.getElementById('panel-placeholder').style.display='none';
  const content = document.getElementById('panel-content');
  content.style.display='block';
  const color = GROUP_COLORS[d.group]||'#888';
  const initiated = d.initiated||'Unknown';
  const ceased = d.ceased||(d.fate==='Ongoing'?'Present':'Unknown');

  const logoHtml = d.logo
    ? `<img class="logo-img" src="logos/${d.logo}" alt="${d.name} logo">`
    : '';
  const tradingHtml = d.tradingName
    ? `<div class="trading-name">Trading as: ${d.tradingName}</div>` : '';

  const inEdges = cy.edges(`[target="${d.id}"]`).sort((a,b)=>+a.data('year')-+b.data('year'));
  const outEdges = cy.edges(`[source="${d.id}"]`).sort((a,b)=>+a.data('year')-+b.data('year'));

  function connItem(e, otherId) {
    const other = cy.$id(otherId);
    const name = other.length ? other.data('name') : otherId;
    const tc = EDGE_COLOR[e.data('type')]||'#555';
    return `<div class="conn-item">
      <span class="conn-year">${e.data('year')}</span>
      <span class="conn-type" style="background:${tc}">${e.data('type')}</span>
      <span class="conn-name" onclick="focusNode('${otherId}')">${name}</span>
    </div>`;
  }

  let connHtml = '';
  if (inEdges.length) {
    connHtml += '<div class="conn-section-title">Absorbed from</div>';
    inEdges.forEach(e => connHtml += connItem(e, e.data('source')));
  }
  if (outEdges.length) {
    connHtml += '<div class="conn-section-title">Became part of</div>';
    outEdges.forEach(e => connHtml += connItem(e, e.data('target')));
  }

  const noteHtml = d.notes && !d.notes.startsWith('trading name')
    ? `<div class="row"><span class="label">Notes</span><span style="font-size:0.78rem;color:#aaa;text-align:right">${d.notes}</span></div>` : '';

  content.innerHTML = `
    ${logoHtml}
    <h2>${d.name}</h2>
    ${tradingHtml}
    <span class="group-tag" style="background:${color}">${d.group}</span>
    <div class="row"><span class="label">Period</span><span>${initiated}–${ceased}</span></div>
    <div class="row"><span class="label">Fate</span><span>${d.fate}</span></div>
    ${noteHtml}
    ${connHtml}
    <a class="view-page" href="societies/${d.id}.html">View full page →</a>
  `;

  cy.elements().removeClass('highlighted faded');
  const neighbourhood = node.closedNeighborhood();
  cy.elements().not(neighbourhood).addClass('faded');
  neighbourhood.addClass('highlighted');
  node.addClass('highlighted');
}

window.focusNode = function(id) {
  const node = cy.$id(id);
  if (!node.length) return;
  cy.animate({fit:{eles:node.closedNeighborhood(),padding:80},duration:400});
  showPanel(node);
};

cy.on('tap','node', e => showPanel(e.target));
cy.on('tap', e => { if(e.target===cy) clearPanel(); });
</script>
